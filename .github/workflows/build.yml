name: Build ZZNetworkLogger

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Theos and Deps
        run: |
          export THEOS=/opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          
          # Install Theos
          sudo mkdir -p $THEOS
          sudo chown $(whoami) $THEOS
          git clone --depth 1 https://github.com/theos/theos.git $THEOS --quiet
          
          # Download SDKs (patched with private framework tbds)
          echo "Downloading SDKs..."
          curl -sLo /tmp/sdks.zip "https://codeload.github.com/theos/sdks/zip/refs/heads/master"
          unzip -qo /tmp/sdks.zip -d /tmp/s
          mkdir -p $THEOS/sdks
          cp -r /tmp/s/sdks-master/iPhoneOS*.sdk $THEOS/sdks/ 2>/dev/null
          echo "Available SDKs:"
          ls $THEOS/sdks/
          
          # Ensure dm.pl exists (included in Theos)
          if [ -f "$THEOS/bin/dm.pl" ]; then
            echo "dm.pl found"
          else
            echo "WARNING: dm.pl missing, creating stub"
            cat > $THEOS/bin/dm.pl << 'PERL'
#!/usr/bin/env perl
use strict;
use warnings;
# Stub dm.pl for basic packaging
print "dm.pl stub - packaging .deb\n";
PERL
            chmod +x $THEOS/bin/dm.pl
          fi
          
          # Verify Perl modules
          perl -e 'use IO::Compress::Gzip' 2>/dev/null && echo "Perl IO::Compress OK" || echo "Perl IO::Compress MISSING"
      
      - name: Build
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1 2>&1
      
      - name: Package fallback
        if: failure()
        run: |
          # If make package fails, at least get the .dylib
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          make all 2>&1 || echo "Build also failed"
          find . -name "*.dylib" -type f
      
      - name: List output
        run: |
          echo "=== Packages ==="
          ls -la packages/ 2>/dev/null || echo "No packages dir"
          echo "=== Dylibs ==="
          find . -name "*.dylib" -type f 2>/dev/null || echo "No dylibs"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZZNetworkLogger
          path: |
            packages/*.deb
            .theos/obj/**/*.dylib
            *.dylib
          if-no-files-found: warn
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') && success()
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
          generate_release_notes: true
