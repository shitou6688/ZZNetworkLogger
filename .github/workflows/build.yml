name: Build ZZNetworkLogger

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Theos
        run: |
          export THEOS=/opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          sudo mkdir -p $THEOS && sudo chown $(whoami) $THEOS
          git clone --depth 1 https://github.com/theos/theos.git $THEOS --quiet
          cd $THEOS && git submodule update --init --recursive --depth 1 2>/dev/null || true
          curl -sLo /tmp/sdks.zip "https://codeload.github.com/theos/sdks/zip/refs/heads/master"
          unzip -qo /tmp/sdks.zip -d /tmp/s
          mkdir -p $THEOS/sdks
          cp -r /tmp/s/sdks-master/iPhoneOS*.sdk $THEOS/sdks/
          echo "SDKs:" && ls $THEOS/sdks/
          brew install ldid 2>/dev/null || echo "ldid via brew failed, will try other methods"
          which ldid || echo "ldid not in PATH"
      
      - name: Build dylib
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          # 如果 ldid 没有安装，设置 THEOS 跳过签名
          if ! which ldid > /dev/null 2>&1; then
            echo "ldid not found, building unsigned"
            export CODESIGN_ALLOCATE=false
          fi
          make all 2>&1 || true
      
      - name: Collect output
        run: |
          mkdir -p artifacts
          # 找到所有 .dylib 文件
          find .theos -name "*.dylib" -type f -exec cp {} artifacts/ \;
          ls -la artifacts/
          echo "output_dir=$(pwd)/artifacts" >> $GITHUB_ENV
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZZNetworkLogger
          path: artifacts/*.dylib
