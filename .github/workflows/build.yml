name: Build ZZNetworkLogger

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Theos
        run: |
          export THEOS=/opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          sudo mkdir -p $THEOS && sudo chown $(whoami) $THEOS
          git clone --depth 1 https://github.com/theos/theos.git $THEOS --quiet
          curl -sLo /tmp/sdks.zip "https://codeload.github.com/theos/sdks/zip/refs/heads/master"
          unzip -qo /tmp/sdks.zip -d /tmp/s
          mkdir -p $THEOS/sdks
          cp -r /tmp/s/sdks-master/iPhoneOS*.sdk $THEOS/sdks/
          echo "SDKs:" && ls $THEOS/sdks/
      
      - name: Build dylib
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make all 2>&1
      
      - name: List output
        run: |
          find . -name "*.dylib" -type f
          if [ -d packages ]; then ls -la packages/; fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZZNetworkLogger
          path: .theos/obj/**/*.dylib
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          find .theos -name "*.dylib" -type f -exec cp {} release/ \;
          ls -la release/
