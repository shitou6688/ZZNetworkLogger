name: Build ZZNetworkLogger

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Theos
        run: |
          export THEOS=/opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          sudo mkdir -p $THEOS
          sudo chown $(whoami) $THEOS
          git clone --depth 1 https://github.com/theos/theos.git $THEOS --quiet
          
          # Install build deps
          brew install dpkg ldid 2>/dev/null || true
          
          # Download patched SDKs (contains private framework tbds)
          echo "Downloading SDKs..."
          curl -sLo /tmp/sdks-master.zip "https://codeload.github.com/theos/sdks/zip/refs/heads/master"
          unzip -qo /tmp/sdks-master.zip -d /tmp/sdks-extract
          mkdir -p $THEOS/sdks
          cp -r /tmp/sdks-extract/sdks-master/iPhoneOS*.sdk $THEOS/sdks/ 2>/dev/null || true
          ls -la $THEOS/sdks/
      
      - name: Build
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1
      
      - name: List output
        run: ls -la packages/ || echo "No packages dir"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZZNetworkLogger
          path: packages/*.deb
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
          generate_release_notes: true
